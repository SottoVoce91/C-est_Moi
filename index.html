

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #fff5f7, #fce4ec);
  color: #4a2c2a;
  overflow-x: hidden;
}

/* 🌌 background */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* layout */
section {
  min-height: 100vh;
  padding: 50px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 340px;
  text-align: center;
}

h1 {
  font-size: 1.6rem;
  color: #b76e79;
}

p {
  font-size: 13px;
  line-height: 1.6;
}

.btn {
  margin-top: 14px;
  padding: 12px 18px;
  border: none;
  background: #b76e79;
  color: white;
  border-radius: 22px;
  font-size: 13px;
  cursor: pointer;
}

.hidden { display:none; }

/* 💌 secret */
.secret-msg {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  color: #b76e79;
  padding: 10px 16px;
  border-radius: 20px;
  font-size: 12px;
}

/* ✨ particles */
.particle {
  position: fixed;
  pointer-events: none;
  font-size: 14px;
  opacity: 0.8;
  transition: all 1s ease-out;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<!-- Intro -->
<section id="intro">
<div class="container">
<h1>Hi, MG here</h1>
<p>Let’s see if you’re curious enough.</p>
<button class="btn" onclick="go('story', event)">Continue</button>
</div>
</section>

<!-- Story -->
<section id="story">
<div class="container">
<h1>About me</h1>
<p>I don’t say much at first, but I notice details.</p>
</div>
</section>

<!-- Space -->
<section id="space">
<div class="container">
<h1>Another side</h1>
<p>Space, quiet nights, and things that feel infinite.</p>
</div>
</section>

<!-- Secrets -->
<section id="secrets">
<div class="container">

<h1>Curious?</h1>

<button class="btn" onclick="pick('curious'); reveal('s1', event)">What I enjoy</button>
<p id="s1" class="hidden">Cybersec, Geoguessr, coffee bars</p>

<button class="btn" onclick="pick('playful'); reveal('s2', event)">What I notice</button>
<p id="s2" class="hidden">Details others miss</p>

<button class="btn" onclick="pick('romantic'); reveal('s3', event)">What I admire</button>
<p id="s3" class="hidden">Consistency & emotional awareness</p>

</div>
</section>

<!-- Ending -->
<section id="ending">
<div class="container">

<h1>Final</h1>
<div id="endingText"></div>

<div id="codeBox" style="display:none;">
<p>Your code:</p>
<div id="userCode" style="font-weight:bold;color:#b76e79;"></div>
<button class="btn" onclick="copyCode(event)">Copy code</button>
</div>

<a href="https://instagram.com/allo_cheri" target="_blank">
<button class="btn">Say hi</button>
</a>

</div>
</section>

<script>
// 🌌 galaxy (lightweight)
const c = document.getElementById("stars");
const ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = Array.from({length:50},()=>({
  x:Math.random()*c.width,
  y:Math.random()*c.height,
  r:Math.random()*1.2
}));

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="#ffd6e0";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,6.28);
    ctx.fill();
    s.y+=0.15;
    if(s.y>c.height)s.y=0;
  });
  requestAnimationFrame(draw);
}
draw();

// 💖 heart burst
function burst(x,y){
  for(let i=0;i<5;i++){
    let h=document.createElement("div");
    h.innerHTML="❤";
    h.className="particle";
    h.style.left=x+"px";
    h.style.top=y+"px";
    h.style.color="#e6a4b4";
    document.body.appendChild(h);

    let a=Math.random()*6.28,d=30+Math.random()*20;
    setTimeout(()=>{
      h.style.transform=`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
      h.style.opacity=0;
    },10);

    setTimeout(()=>h.remove(),800);
  }
}

// ✨ section particles (touch)
let last=0, moves=0, shown=false;

function section(){
  let sec=document.elementFromPoint(innerWidth/2,innerHeight/2);
  return sec?.closest("section")?.id;
}

document.addEventListener("touchmove",e=>{
  let now=Date.now();
  if(now-last<120)return;
  last=now;

  let t=e.touches[0];
  let sec=section();

  if(!["intro","story","space"].includes(sec))return;

  let el=document.createElement("div");
  el.className="particle";
  el.innerHTML=sec==="space"?"✦":"❤";
  el.style.left=t.clientX+"px";
  el.style.top=t.clientY+"px";
  el.style.color=sec==="space"?"#ffd6e0":"#e6a4b4";

  document.body.appendChild(el);

  setTimeout(()=>{
    el.style.top=(t.clientY-30)+"px";
    el.style.opacity=0;
  },10);

  setTimeout(()=>el.remove(),900);

  moves++;
  if(moves>70 && !shown){
    shown=true;
    let m=document.createElement("div");
    m.className="secret-msg";
    m.innerText="You stayed… I like that.";
    document.body.appendChild(m);
    setTimeout(()=>m.remove(),4000);
  }
});

// 🧠 personality
let p={curious:0,playful:0,romantic:0};
function pick(t){p[t]++;}

// reveal
function reveal(id,e){
  document.getElementById(id).style.display="block";
  burst(e.clientX,e.clientY);
}

// scroll
function go(id,e){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
  burst(e.clientX,e.clientY);
}

// 🔐 code
function gen(){
  let c=localStorage.getItem("mg_code");
  if(c)return c;
  let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  c="MG-";
  for(let i=0;i<5;i++)c+=chars[Math.floor(Math.random()*chars.length)];
  localStorage.setItem("mg_code",c);
  return c;
}

function copyCode(e){
  navigator.clipboard.writeText(gen());
  burst(e.clientX,e.clientY);
}

// 🧠 ending logic
window.addEventListener("scroll",()=>{
  let rect=document.getElementById("ending").getBoundingClientRect();

  if(rect.top<innerHeight-80){
    document.getElementById("codeBox").style.display="block";
    document.getElementById("userCode").innerText=gen();

    let msg="You’re playful.";
    if(p.curious>1) msg="You’re curious. I like that.";
    else if(p.romantic>1) msg="You notice feelings. Rare.";

    document.getElementById("endingText").innerText=msg;
  }
});
</script>

</body>
</html>
